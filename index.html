<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de estoque</title>
    <link rel="stylesheet" href="listaDeEstoque.css">
    
    <script src="./listaDeEstoque.js" defer></script>
</head>
<body>
    <h1>Lista de estoque</h1>
    <main>
        <input/>
        <table id="tabela-produtos">
            <thead id="cabecalho-tabela">
                <tr>
                    <th>Código</th>
                    <th>Produto</th>
                    <th>Descrição</th>
                    <th>Quantidade</th>
                    <th>Preço</th>
                    <th>Editar</th>
                    <th>Excluir</th>
                </tr>
            </thead>
            <tbody id="corpo-tabela">
                <!-- Linhas da tabela serão adicionadas aqui pelo JavaScript -->
            </tbody>
        </table>
    </main>
</body>

</html>
